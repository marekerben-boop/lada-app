<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Student – úkoly</title>

  <!-- stejné stylesheety jako v adminu -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="container" style="max-width:900px;margin:24px auto;padding:0 12px;">

    <!-- LOGIN KARTA -->
    <div id="loginCard" class="card">
      <div class="card__head">Přihlášení studenta</div>

      <div class="card__body">
        <div class="grid" style="grid-template-columns:1fr 1fr auto; gap:12px;">
          <div class="field">
            <label for="studentCode" class="label">Kód studenta</label>
            <input id="studentCode" class="input" type="text" placeholder="např. ABC123">
          </div>
          <div class="field">
            <label for="studentPin" class="label">PIN</label>
            <input id="studentPin" class="input" type="password" placeholder="****">
          </div>
          <div class="field" style="align-self:end;">
            <button id="studentLoginBtn" type ="button" class="btn">Přihlásit</button>
          </div>
        </div>
      </div>

      <div class="card__foot" style="display:flex;align-items:center;gap:12px;justify-content:space-between;">
        <span id="who">Nepřihlášen</span>
        <button id="studentLogoutBtn" class="btn btn--secondary btn--xs hidden">Odhlásit</button>
      </div>
    </div>

    <!-- DASHBOARD / ÚKOLY -->
    <div id="studentArea" class="hidden">
      <div class="card">
        <div class="card__head">Moje úkoly</div>
        <div class="card__body">
          <div class="table-wrap">
            <table id="assignTblStudent" class="table" style="width:100%;">
              <thead>
                <tr>
                  <th style="text-align:left;">Balíček</th>
                  <th style="text-align:left;">Aktivita</th>
                  <th style="text-align:left;">Status</th>
                  <th style="text-align:left;">Akce</th>
                </tr>
              </thead>
              <tbody>
                <!-- dynamicky plní student.js -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="card__foot small">Klikni na <em>spustit</em> pro otevření aktivity. Po dokončení lze označit <em>hotovo</em>.</div>
      </div>
    </div>

  </div>

  <!-- Firebase (stejné verze jako v adminu) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</body>
